# ===============================
# = PARAMETERS
# ===============================

spring:

  datasource:
    url: jdbc:mysql://localhost:3306/PETCLINIC_DB?useSSL=false
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  sql:
    init:
      mode: always
      platform: mysql

  jpa:
    generate-ddl: false
    open-in-view: false
    show-sql: true

    hibernate:
      ddl-auto: create-drop

  data:
    rest:
      basePath: /api

logging:

  level:
    root: INFO

  file:
    name: ${user.home}/temp/application.log

server:
  port: 8080